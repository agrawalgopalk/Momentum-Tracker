services:
  - type: web
    name: momentum-tracker-app
    runtime: python
    plan: free
    # This line tells Render to install your packages before starting
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/dashboard.py --server.port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false 
      # This line forces Render to use Python 3.11 instead of 3.14
      - key: PYTHON_VERSION
        value: 3.11.0
